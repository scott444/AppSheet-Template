<style>
  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* Apps Script serves inside a sandboxed iframe — pin the full height chain */
  html, body { height: 100%; }
  /* #app is the only child of body, but body's grid expects two children
     (topbar + shell). display:contents makes #app invisible to the grid
     so its children become the actual grid items. */
  #app { display: contents; }

  /* ── Color tokens ── */
  :root {
    --primary:       #1976D2;
    --primary-dark:  #1565C0;
    --primary-light: #e8f0fe;
    --bg:            #f8f9fa;
    --surface:       #ffffff;
    --text:          #202124;
    --text-muted:    #5f6368;
    --border:        #e0e0e0;
    --success-bg:    #e6f4ea;
    --success-text:  #137333;
    --error-bg:      #fce8e6;
    --error-text:    #c5221f;
    --shadow-sm:     0 1px 3px rgba(0,0,0,0.12);
    --shadow-md:     0 2px 6px rgba(0,0,0,0.15);
  }

  /* ── Base ── */
  body {
    font-family: 'Google Sans', Roboto, Arial, sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    display: grid;
    grid-template-rows: 56px 1fr;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ── Top bar ── */
  .topbar {
    background: var(--primary);
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 12px;
    box-shadow: var(--shadow-md);
    z-index: 10;
  }
  .topbar-logo {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.2px;
    white-space: nowrap;
  }
  .topbar-spacer { flex: 1; }
  .topbar-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    opacity: 0.92;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #69f0ae;
    flex-shrink: 0;
  }

  /* ── Shell (sidebar + content) ── */
  .shell {
    display: flex;
    overflow: hidden;
    height: 100%;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 8px 0;
    display: flex;
    flex-direction: column;
  }
  .sidebar-section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 16px 16px 6px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    color: var(--text-muted);
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    user-select: none;
  }
  .nav-item:hover {
    background: var(--bg);
    color: var(--text);
  }
  .nav-item.active {
    background: var(--primary-light);
    border-left-color: var(--primary);
    color: var(--primary);
    font-weight: 500;
  }
  .nav-item .icon {
    font-family: 'Material Symbols Rounded';
    font-size: 20px;
    font-weight: 300;
    line-height: 1;
  }
  .nav-item .label { font-size: 14px; }

  /* ── Content area ── */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
    background: var(--bg);
  }

  /* ── Sections ── */
  .section { display: none; }
  .section.active { display: block; }
  .section-title {
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 20px;
    color: var(--text);
  }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border-radius: 8px;
    padding: 20px 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.3px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* ── Status badge ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 16px;
    font-size: 13px;
    font-weight: 500;
  }
  .badge.ok   { background: var(--success-bg); color: var(--success-text); }
  .badge.err  { background: var(--error-bg);   color: var(--error-text); }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--primary);
    color: #fff;
    border: none;
    padding: 9px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    font-weight: 500;
    transition: background 0.15s;
  }
  .btn:hover    { background: var(--primary-dark); }
  .btn:disabled { background: #b0bec5; cursor: not-allowed; }
  .btn .icon    { font-family: 'Material Symbols Rounded'; font-size: 18px; }
  .btn-row      { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }

  /* ── Result/output box ── */
  .result-box {
    margin-top: 16px;
    padding: 14px 16px;
    background: #f1f3f4;
    border-radius: 6px;
    font-family: 'Roboto Mono', monospace;
    font-size: 12px;
    white-space: pre-wrap;
    color: var(--text);
    display: none;
  }
  .result-box.error { background: var(--error-bg); color: var(--error-text); }

  /* ── Sheets table ── */
  .sheets-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 16px;
    font-size: 14px;
  }
  .sheets-table th {
    text-align: left;
    padding: 10px 12px;
    background: var(--bg);
    border-bottom: 2px solid var(--border);
    font-weight: 600;
    color: var(--text-muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .sheets-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .sheets-table tr:last-child td { border-bottom: none; }
  .sheets-table tr:hover td { background: var(--bg); }
  .sheets-table .sheet-link {
    color: var(--primary);
    text-decoration: none;
    font-weight: 500;
  }
  .sheets-table .sheet-link:hover { text-decoration: underline; }
  .sheets-table .id-cell {
    font-family: 'Roboto Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .empty-state {
    padding: 32px;
    text-align: center;
    color: var(--text-muted);
  }

  /* ── Getting Started steps ── */
  .steps { display: flex; flex-direction: column; gap: 12px; }
  .step {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .step-number {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--primary);
    color: #fff;
    font-weight: 600;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .step-body { flex: 1; }
  .step-title { font-weight: 500; margin-bottom: 4px; }
  .step-desc  { color: var(--text-muted); line-height: 1.6; }
  code {
    background: #f1f3f4;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'Roboto Mono', monospace;
    font-size: 12px;
    color: #c5221f;
  }

  /* ── Forms (used in EqlUpload, DriveSetup) ── */
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 6px;
  }
  .form-input {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    transition: border-color 0.15s;
  }
  .form-input:focus { outline: none; border-color: var(--primary); }
  .form-input:disabled { opacity: 0.6; cursor: not-allowed; }

  /* ── Project detail tabs ── */
  .tab-bar {
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--border);
    margin-bottom: 0;
  }
  .tab-item {
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: color 0.15s, border-color 0.15s;
    user-select: none;
  }
  .tab-item:hover { color: var(--text); }
  .tab-item.active { color: var(--primary); border-bottom-color: var(--primary); }

  /* ── Save button (primary color) ── */
  .btn-save { background:var(--primary); color:#fff; border:none; }
  .btn-save:hover:not(:disabled) { opacity:0.9; }
  .btn-save:disabled { opacity:0.6; cursor:not-allowed; }

  /* ── View-mode segmented toggle ── */
  .view-mode-bar { display:flex; gap:0; border:1px solid var(--border); border-radius:6px; overflow:hidden; flex-shrink:0; }
  .view-mode-btn { padding:6px 14px; font-size:13px; font-weight:500; background:transparent; color:var(--text-muted); border:none; cursor:pointer; transition:background 0.15s, color 0.15s; }
  .view-mode-btn:hover { background:var(--bg); color:var(--text); }
  .view-mode-btn.active { background:var(--primary); color:#fff; }

  /* ── Deleted / added row styling in Modifications view ── */
  .eql-row-deleted td { background:var(--error-bg) !important; color:var(--text-muted); text-decoration:line-through; }
  .eql-row-added td { background:var(--success-bg) !important; color:var(--success-text); }

  /* ── Small action buttons in table ── */
  .btn-danger-sm { padding:2px 8px; font-size:12px; background:var(--error-bg); color:var(--error-text); border:none; border-radius:4px; cursor:pointer; line-height:1.6; }
  .btn-danger-sm:disabled { opacity:0.5; cursor:not-allowed; }
  .btn-undo-sm { padding:2px 8px; font-size:12px; background:var(--bg); color:var(--text-muted); border:1px solid var(--border); border-radius:4px; cursor:pointer; line-height:1.6; }
  .btn-undo-sm:disabled { opacity:0.5; cursor:not-allowed; }

  /* ── Price summary ── */
  .price-summary { display:inline-flex; flex-direction:column; gap:4px; padding:12px 16px; border:1px solid var(--border); border-radius:6px; background:var(--bg); font-size:13px; }
  .price-row { display:flex; justify-content:space-between; gap:32px; }
  .price-label { color:var(--text-muted); }
  .price-value { font-family:'Roboto Mono', monospace; text-align:right; }
  .price-delta-up .price-value { color:var(--error-text); }
  .price-delta-down .price-value { color:var(--success-text); }

  /* ── ADL action badges ── */
  .adl-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
  }
  .adl-add    { background: var(--success-bg); color: var(--success-text); }
  .adl-delete { background: var(--error-bg);   color: var(--error-text); }

  /* ── Inline metadata edit inputs ── */
  .meta-input {
    width: 100%;
    padding: 4px 8px;
    border: 1px solid transparent;
    border-radius: 4px;
    font-size: 13px;
    font-family: inherit;
    background: transparent;
    color: var(--text);
    transition: border-color 0.15s, background 0.15s;
  }
  .meta-input:hover { border-color: var(--border); background: var(--bg); }
  .meta-input:focus { outline: none; border-color: var(--primary); background: var(--surface); }

  /* ── Nomenclature cell (mono, truncated) ── */
  .nomenclature-cell {
    font-weight: 500;
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Context menu ── */
  .context-menu {
    position: fixed;
    z-index: 200;
    min-width: 180px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: var(--shadow-md);
    padding: 4px 0;
    user-select: none;
  }
  .context-menu-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    transition: background 0.1s;
  }
  .context-menu-item .icon {
    font-family: 'Material Symbols Rounded';
    font-size: 16px;
    font-weight: 300;
    line-height: 1;
    color: var(--text-muted);
  }
  .context-menu-item:hover { background: var(--bg); }
  .context-menu-item--danger { color: var(--error-text); }
  .context-menu-item--danger .icon { color: var(--error-text); }
  .context-menu-item.disabled { opacity: 0.45; cursor: not-allowed; pointer-events: none; }
  .context-menu-separator {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* ── Responsive: sidebar becomes tab bar at ≤768px ── */
  @media (max-width: 768px) {
    body { grid-template-rows: 56px auto 1fr; }
    .shell { flex-direction: column; }
    .sidebar {
      width: 100%;
      flex-direction: row;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0;
      border-right: none;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-section-label { display: none; }
    .nav-item {
      flex-direction: column;
      gap: 2px;
      padding: 10px 16px;
      border-left: none;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      font-size: 12px;
    }
    .nav-item.active {
      border-left-color: transparent;
      border-bottom-color: var(--primary);
    }
    .content { padding: 20px 16px; }
  }
</style>
